name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: longevity
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Backend tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://postgres:pw@localhost:5432/longevity?sslmode=disable
        run: |
          go vet ./...
          go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Web build
        working-directory: web
        run: |
          npm ci
          npm run build

  # Render deploys via its own GitHub integration (render.yaml blueprint),
  # not from this workflow. This job targets Fly and no-ops until a
  # FLY_API_TOKEN secret is added.
  deploy-fly:
    needs: test
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - if: env.FLY_API_TOKEN != ''
        uses: superfly/flyctl-actions/setup-flyctl@master
      - if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --remote-only
      - if: env.FLY_API_TOKEN == ''
        run: echo "FLY_API_TOKEN not set — skipping Fly deploy (Render handles deploys)."

  android-apk:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Unit tests + lint
        working-directory: android
        run: ./gradlew testDebugUnitTest lintDebug
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-reports
          path: android/app/build/reports/
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
